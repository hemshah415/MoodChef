{% extends 'base.html' %}

{% block title %}Choose Mood{% endblock %}

{% block content %}
<div class="logo">
    <div class="logo-icon">😊</div>
    <h1>Choose Your Mood</h1>
    <p>How are you feeling right now?</p>
</div>

<form method="POST" action="/recommend">
    <div class="form-group">
        <label for="mood">Your Mood</label>
        <select name="mood" id="mood">
            <option value="happy">Happy 😊</option>
            <option value="sad">Sad 😢</option>
            <option value="angry">Angry 😠</option>
            <option value="surprised">Surprised 😲</option>
            <option value="fearful">Fearful 😨</option>
            <option value="disgusted">Disgusted 🤢</option>
            <option value="neutral">Neutral 😐</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="diet">Dietary Preference</label>
        <select name="diet" id="diet">
            <option value="veg">Vegetarian</option>
            <option value="non-veg">Non-Vegetarian</option>
            <option value="vegan">Vegan</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="nutrition">Nutrition Goal</label>
        <select name="nutrition" id="nutrition">
            <option value="balanced">Balanced</option>
            <option value="high-protein">High Protein</option>
            <option value="low-carb">Low Carb</option>
        </select>
    </div>
    
    <button type="submit" class="btn btn-primary" style="margin-top: 10px;">
        Get Recipe
    </button>
</form>

<div style="text-align: center; margin: 20px 0;">
    <span style="color: var(--text-muted); font-size: 14px;">Or prefer to use camera?</span>
</div>

<a href="/detect" class="btn btn-accent">
    📷 Detect Mood Automatically
</a>

<a href="/home" class="back-link">
    &larr; Back to Home
</a>
{% endblock %}
