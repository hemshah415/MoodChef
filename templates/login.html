<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoodChef - Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
  min-height: 100vh;
  background: linear-gradient(135deg, #a18cd1, #fbc2eb);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', sans-serif;
}
  .card {
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  color: rgb(112, 34, 34);
}
  .logo { text-align: center; margin-bottom: 24px; }
  .logo-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #667eea, #9b6fd4); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 12px; }
  .logo h1 { font-size: 22px; font-weight: 700; color: #2d2d2d; }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; margin-top: 16px; }
  input { width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #7c6fdd; }
  .btn {
  background: linear-gradient(135deg, #ffb703, #fb8500);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-weight: bold;
  cursor: pointer;
}
  .link { text-align: center; margin-top: 18px; font-size: 13px; color: #888; }
  .link a { color: #7c6fdd; text-decoration: none; font-weight: 600; }
  .error { background: #fee2e2; color: #dc2626; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🍽️</div>
    <h1>MoodChef</h1>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
 <form method="POST" action="/login">
    <label>Email</label>
    <input type="email" name="email" placeholder="Enter your email" required>
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter your password" required>
    <button type="submit" class="btn">Login</button>
  </form>
  <div class="link">Don't have an account? <a href="/signup">Sign up here</a></div>
</div>
</body>
</html>
